    <path d="M300 544 L462 249 C486 206 538 206 563 249 L854 790"
          fill="none" stroke="url(#aBlue)" stroke-width="156" mask="url(#aCut)"/>
    <path d="M316 535 L470 256 C491 218 534 218 554 256 L832 772"
          fill="none" stroke="#92F2FF" stroke-opacity="0.44" stroke-width="10" mask="url(#aCut)"/>

    <path d="M302 586 H412 C495 586 510 542 586 518 C622 507 660 508 714 514"
          fill="none" stroke="#02101F" stroke-opacity="0.72" stroke-width="66"/>
    <path d="M302 586 H412 C495 586 510 542 586 518 C622 507 660 508 714 514"
          fill="none" stroke="url(#flowBlue)" stroke-width="44"/>

    <path d="M265 690 H426 C504 690 520 636 588 618 C620 610 656 610 696 612 C747 615 766 647 792 696 L840 790"
          fill="none" stroke="#02101F" stroke-opacity="0.8" stroke-width="78"/>
    <path d="M265 690 H426 C504 690 520 636 588 618 C620 610 656 610 696 612 C747 615 766 647 792 696 L840 790"
          fill="none" stroke="url(#flowBlue)" stroke-width="56"/>

    <path d="M268 790 H390 C475 790 500 744 536 681 L578 608"
          fill="none" stroke="#02101F" stroke-opacity="0.76" stroke-width="62"/>
    <path d="M268 790 H390 C475 790 500 744 536 681 L578 608"
          fill="none" stroke="url(#flowBlue)" stroke-width="42"/>

    <rect x="260" y="561" width="78" height="48" rx="13" fill="#061326" opacity="0.82"/>
    <rect x="249" y="554" width="76" height="48" rx="13" fill="url(#nodeBlue)"/>
    <rect x="201" y="656" width="118" height="56" rx="15" fill="#061326" opacity="0.82"/>
    <rect x="190" y="648" width="122" height="56" rx="15" fill="url(#nodeBlue)"/>
    <rect x="236" y="755" width="88" height="54" rx="15" fill="#061326" opacity="0.82"/>
    <rect x="225" y="747" width="88" height="54" rx="15" fill="url(#nodeBlue)"/>
  </g>
